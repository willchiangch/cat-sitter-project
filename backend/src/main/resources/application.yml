spring:
  application:
    name: pet-sitter-backend
  profiles:
    active: local # 預設啟動本地配置
  jpa:
    open-in-view: false
  jackson:
    default-property-inclusion: non-null
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2


app:
  security:
    internal-secret: ${INTERNAL_CRON_SECRET:local-secret-123}
