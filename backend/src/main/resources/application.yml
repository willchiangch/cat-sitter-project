server:
  port: ${PORT:8080}

spring:
  application:
    name: pet-sitter-backend
  profiles:
    default: local # 僅在未指定任何 profile 時套用，不會覆蓋環境變數 SPRING_PROFILES_ACTIVE
  jpa:
    open-in-view: false
  jackson:
    default-property-inclusion: non-null
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  task:
    execution:
      thread-name-prefix: notify-
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

app:
  security:
    internal-secret: ${INTERNAL_CRON_SECRET:local-secret-123}
    # application-local.yml 有 .gitignore，CI checkout 後不存在該檔案；
    # 沒有這個預設值 @ActiveProfiles("local") 的測試會因為 placeholder 解析失敗
    # 而讓整個 ApplicationContext 炸掉 (影響所有 @SpringBootTest)
    jwt-secret: ${APP_SECURITY_JWT_SECRET:v9y$B&E)H@McQfTjWnZr4u7x!A%C*F-JaNdRgUkXp2s5v8y/B?E(G+KbPeShVmYq}
    jwt-expiration: 86400000 # 24 小時，與 application-prod.yml 一致，非機密不需要走環境變數
  crypto:
    key: ${APP_CRYPTO_KEY:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}
  email:
    resend-api-key: ${RESEND_API_KEY:}
    from-address: ${EMAIL_FROM_ADDRESS:WhiskerWatch <onboarding@resend.dev>}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  google:
    # Client ID 非機密（設計上會嵌入前端 JS），直接寫版控預設值方便本地開發免設定即可用
    client-id: ${GOOGLE_CLIENT_ID:1020176535925-78mcs53q25ku3s4ob6j0kpvp6tpu32cu.apps.googleusercontent.com}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
