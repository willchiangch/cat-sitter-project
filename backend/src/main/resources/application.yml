server:
  port: ${PORT:8080}

spring:
  application:
    name: pet-sitter-backend
  profiles:
    default: local # 僅在未指定任何 profile 時套用，不會覆蓋環境變數 SPRING_PROFILES_ACTIVE
  jpa:
    open-in-view: false
  jackson:
    default-property-inclusion: non-null
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  task:
    execution:
      thread-name-prefix: notify-
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

app:
  security:
    internal-secret: ${INTERNAL_CRON_SECRET:local-secret-123}
  crypto:
    key: ${APP_CRYPTO_KEY:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
