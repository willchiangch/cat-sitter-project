server:
  port: ${PORT:8080}

spring:
  application:
    name: pet-sitter-backend
  profiles:
    default: local # 僅在未指定任何 profile 時套用，不會覆蓋環境變數 SPRING_PROFILES_ACTIVE
  jpa:
    open-in-view: false
  jackson:
    default-property-inclusion: non-null
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2


app:
  security:
    internal-secret: ${INTERNAL_CRON_SECRET:local-secret-123}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
