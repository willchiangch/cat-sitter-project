debug: true
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cat_sitter_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password123}
    driver-class-name: org.postgresql.Driver
    # Hikari 連線池優化：針對 Supabase 和 Cloud Run 冷啟動
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 30000
  jpa:
    hibernate:
      # 既然用了 Flyway，就關閉 Hibernate 的自動建表，全權交給 Flyway 處理
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid, email, profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:dummy-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:dummy-client-secret}
            scope: email, public_profile

application:
  jwt:
    secret-key: ${APPLICATION_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 3600000 # 1 hour
    refresh-token:
      expiration: 604800000 # 7 days
  resend:
    api-key: ${RESEND_API_KEY:re_default_key}
    from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
  subscription:
    notification-days: ${SUBSCRIPTION_NOTIFICATION_DAYS:7}
  order:
    pending-payment-timeout-hours: ${ORDER_PENDING_PAYMENT_TIMEOUT:24}
    auto-complete-days: ${ORDER_AUTO_COMPLETE_DAYS:3}
  payuni:
    mer-id: ${PAYUNI_MER_ID:default_mer_id}
    hash-key: ${PAYUNI_HASH_KEY:default_hash_key}
    hash-iv: ${PAYUNI_HASH_IV:default_hash_iv}
    api-url: ${PAYUNI_API_URL:https://api.payuni.com.tw/upp/v1}
  google:
    client-id: ${GOOGLE_CLIENT_ID:your_client_id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your_client_secret}
    redirect-uri: ${GOOGLE_REDIRECT_URL:http://localhost:8081/api/v1/sitters/me/calendar/callback}
  storage:
    type: GCS
    local-path: ./storage/media
    retention-days: 60
    gcp:
      bucket-name: ${APPLICATION_STORAGE_GCP_BUCKET_NAME:whiskerwatch-media-uat}
      credentials-path: ${GCP_KEY_PATH:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.catsitter.api.controller
  default-produces-media-type: application/json

server:
  port: ${PORT:8080}