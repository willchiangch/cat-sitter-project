spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cat_sitter_db
    username: sitter_admin
    password: dev_password123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:secret-placeholder}
            scope:
              - email
              - profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:fb-placeholder}
            client-secret: ${FACEBOOK_CLIENT_SECRET:fb-secret-placeholder}
            scope:
              - email
              - public_profile

# Smoke testing specific settings
