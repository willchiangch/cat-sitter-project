spring:
  datasource:
    url: jdbc:h2:mem:smokedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: mock-id
            client-secret: mock-secret
        provider:
          google:
            issuer-uri: https://accounts.google.com

# Smoke testing specific settings
application:
  jwt:
    secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 3600000
    refresh-token:
      expiration: 604800000
  storage:
    type: LOCAL
    local-path: ./storage/smoke-media
  resend:
    api-key: mock_key
    from-email: "WhiskerWatch <onboarding@resend.dev>"
