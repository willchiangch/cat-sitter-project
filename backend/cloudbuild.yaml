steps:
  # 1. Build & Test (Skip tests for faster CD in UAT)
  - name: 'maven:3.9-eclipse-temurin-21-alpine'
    entrypoint: 'mvn'
    args: ['clean', 'package', '-DskipTests']
    dir: 'backend'

  # 2. Docker Build & Tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA', '.']
    dir: 'backend'

  # 3. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA']

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # 將變數對接到 Trigger 的 Substitution Variables
      - '--set-env-vars'
      - 'SPRING_DATASOURCE_URL=${_DB_URL},SPRING_DATASOURCE_USERNAME=${_DB_USER},SPRING_DATASOURCE_PASSWORD=${_DB_PASS},APPLICATION_JWT_SECRET_KEY=${_JWT_SECRET},GOOGLE_CLIENT_ID=${_G_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_G_CLIENT_SECRET},SPRING_PROFILES_ACTIVE=uat'

images:
  - '$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

substitutions:
  _SERVICE_NAME: 'whiskerwatch-api'
  _DEPLOY_REGION: 'asia-east1'
  _AR_LOCATION: 'asia-east1'
  _AR_REPOSITORY: 'whiskerwatch-repo'
  # 以下變數請在 GCP Trigger 設定介面填入
  _DB_URL: 'jdbc:postgresql://db.example.com:6432/postgres?sslmode=require'
  _DB_USER: 'postgres'
  _DB_PASS: 'password'
  _JWT_SECRET: 'generate-your-own-64-char-string'
  _G_CLIENT_ID: 'your-google-client-id'
  _G_CLIENT_SECRET: 'your-google-client-secret'

options:
  logging: CLOUD_LOGGING_ONLY
