openapi: 3.1.0
info:
  title: Cat Sitter API
  version: 1.0.0
  description: |
    API contract for Cat Sitter platform (sitter/client dual-role).
    - Auth: JWT bearer token, stateless backend (JJWT implementation).
    - Time format: UTC ISO-8601 (`date-time`, Instant mapping).
servers:
  - url: http://localhost:8080
    description: Local
  - url: https://api-uat.example.com
    description: UAT
  - url: https://api.example.com
    description: Production
tags:
  - name: Auth
  - name: SitterProfile
  - name: ClientProfile
  - name: Pet
  - name: Booking
  - name: TrustCircle
  - name: Visit
  - name: Billing
  - name: Notification
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: No Content
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get current account profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /api/v1/sitters/me/profile:
    get:
      tags: [SitterProfile]
      operationId: getSitterProfile
      summary: Get sitter profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitterProfile"
    put:
      tags: [SitterProfile]
      operationId: updateSitterProfile
      summary: Update sitter profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSitterProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitterProfile"
  /api/v1/sitters/me/services:
    post:
      tags: [SitterProfile]
      operationId: createService
      summary: Create service plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicePlan"
    get:
      tags: [SitterProfile]
      operationId: listServices
      summary: List service plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServicePlan"
  /api/v1/sitters/me/services/{serviceId}:
    parameters:
      - $ref: "#/components/parameters/ServiceId"
    put:
      tags: [SitterProfile]
      operationId: updateService
      summary: Update service plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicePlan"
    delete:
      tags: [SitterProfile]
      operationId: deleteService
      summary: Delete service plan
      responses:
        "204":
          description: No Content
  /api/v1/sitters/me/questionnaires:
    post:
      tags: [SitterProfile]
      operationId: createQuestion
      summary: Create questionnaire item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionItem"
    get:
      tags: [SitterProfile]
      operationId: listQuestions
      summary: List questionnaire items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionItem"
  /api/v1/sitters/me/questionnaires/{questionId}:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
    put:
      tags: [SitterProfile]
      operationId: updateQuestion
      summary: Update questionnaire item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionItem"
  /api/v1/sitters/me/questionnaires/reorder:
    patch:
      tags: [SitterProfile]
      operationId: reorderQuestions
      summary: Reorder questionnaire items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderQuestionsRequest"
      responses:
        "204":
          description: No Content
  /api/v1/sitters/{sitterSlug}/booking-preview:
    get:
      tags: [SitterProfile]
      operationId: getBookingPreview
      summary: Public booking preview
      security: []
      parameters:
        - $ref: "#/components/parameters/SitterSlug"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingPreview"
  /api/v1/sitters/{sitterSlug}/availability/public:
    get:
      tags: [Billing]
      operationId: getPublicAvailability
      summary: Public availability with subscription cap check
      security: []
      parameters:
        - $ref: "#/components/parameters/SitterSlug"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAvailability"

  /api/v1/clients/me/profile:
    get:
      tags: [ClientProfile]
      operationId: getClientProfile
      summary: Get client profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
    put:
      tags: [ClientProfile]
      operationId: updateClientProfile
      summary: Update client profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
  /api/v1/clients/me/pets:
    post:
      tags: [Pet]
      operationId: createPet
      summary: Create pet profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    get:
      tags: [Pet]
      operationId: listPets
      summary: List own pets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
  /api/v1/clients/me/pets/{petId}:
    parameters:
      - $ref: "#/components/parameters/PetId"
    get:
      tags: [Pet]
      operationId: getPet
      summary: Get pet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    put:
      tags: [Pet]
      operationId: updatePet
      summary: Update pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePetRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      tags: [Pet]
      operationId: deletePet
      summary: Delete pet
      responses:
        "204":
          description: No Content

  /api/v1/bookings:
    post:
      tags: [Booking]
      operationId: createBooking
      summary: Create booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    get:
      tags: [Booking]
      operationId: getBooking
      summary: Get booking detail
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}/reschedule:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    patch:
      tags: [Booking]
      operationId: rescheduleBooking
      summary: Reschedule before quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleBookingRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/sitters/me/bookings:
    get:
      tags: [Booking]
      operationId: listSitterBookings
      summary: List sitter bookings
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BookingStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}/quote:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    post:
      tags: [Booking]
      operationId: submitQuote
      summary: Submit quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuoteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}/payment-proofs:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    post:
      tags: [Booking]
      operationId: uploadPaymentProof
      summary: Upload payment proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPaymentProofRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentProof"
  /api/v1/bookings/{bookingId}/payments/confirm-offline:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    post:
      tags: [Booking]
      operationId: confirmOfflinePayment
      summary: Confirm offline payment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}/cancel:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    post:
      tags: [Booking]
      operationId: cancelBooking
      summary: Cancel booking
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
  /api/v1/bookings/{bookingId}/referrals:
    parameters:
      - $ref: "#/components/parameters/BookingId"
    post:
      tags: [TrustCircle]
      operationId: createReferral
      summary: Refer booking to trusted sitter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferralRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Referral"
    get:
      tags: [TrustCircle]
      operationId: listReferrals
      summary: List referral records
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Referral"

  /api/v1/sitters/me/trust-circle/search:
    get:
      tags: [TrustCircle]
      operationId: searchTrustCircleCandidates
      summary: Search sitter candidates
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SitterSearchResult"
  /api/v1/sitters/me/trust-circle:
    post:
      tags: [TrustCircle]
      operationId: addTrustCirclePartner
      summary: Add trust-circle partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrustCirclePartnerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustCircleRelation"
  /api/v1/sitters/me/trust-circle/{partnerId}:
    parameters:
      - $ref: "#/components/parameters/PartnerId"
    patch:
      tags: [TrustCircle]
      operationId: updateTrustCircleStatus
      summary: Update trust-circle relation status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrustCircleStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustCircleRelation"
    delete:
      tags: [TrustCircle]
      operationId: removeTrustCirclePartner
      summary: Remove trust-circle partner
      responses:
        "204":
          description: No Content

  /api/v1/sitters/me/visits:
    get:
      tags: [Visit]
      operationId: listSitterVisitsByDate
      summary: List visits by date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Visit"
  /api/v1/visits/{visitId}:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    get:
      tags: [Visit]
      operationId: getVisit
      summary: Get visit detail
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
  /api/v1/visits/{visitId}/checklist:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    patch:
      tags: [Visit]
      operationId: updateVisitChecklist
      summary: Update checklist item completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisitChecklistItem"
  /api/v1/visits/{visitId}/checklist/custom-items:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    post:
      tags: [Visit]
      operationId: createCustomChecklistItem
      summary: Add custom checklist item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomChecklistItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitChecklistItem"
  /api/v1/visits/{visitId}/media:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    post:
      tags: [Visit]
      operationId: uploadVisitMedia
      summary: Upload visit media metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadVisitMediaRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitMedia"
  /api/v1/visits/{visitId}/notes:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    put:
      tags: [Visit]
      operationId: updateVisitNotes
      summary: Update sitter notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVisitNotesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
  /api/v1/visits/{visitId}/complete:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    post:
      tags: [Visit]
      operationId: completeVisit
      summary: Complete one visit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
  /api/v1/clients/me/visits/{visitId}/live-status:
    parameters:
      - $ref: "#/components/parameters/VisitId"
    get:
      tags: [Visit]
      operationId: getLiveVisitStatus
      summary: Client view for live status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveVisitStatus"
  /api/v1/orders/{orderId}/complete:
    parameters:
      - $ref: "#/components/parameters/OrderId"
    post:
      tags: [Visit]
      operationId: completeOrder
      summary: Complete order after all visits done
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /api/v1/sitters/me/payouts:
    get:
      tags: [Billing]
      operationId: getMonthlyPayout
      summary: Monthly payout summary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyPayout"
  /api/v1/sitters/me/subscription:
    get:
      tags: [Billing]
      operationId: getSubscription
      summary: Get sitter subscription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /api/v1/sitters/me/subscription/checkout:
    post:
      tags: [Billing]
      operationId: createSubscriptionCheckout
      summary: Create checkout session for subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionCheckoutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
  /api/v1/payments/webhooks/ecpay:
    post:
      tags: [Billing]
      operationId: handleEcpayWebhook
      summary: ECPay webhook endpoint (idempotent)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
  /api/v1/notifications:
    get:
      tags: [Notification]
      operationId: listNotifications
      summary: List notifications
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
  /api/v1/notifications/{notificationId}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationId"
    patch:
      tags: [Notification]
      operationId: markNotificationAsRead
      summary: Mark notification as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BookingId:
      name: bookingId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VisitId:
      name: visitId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PetId:
      name: petId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ServiceId:
      name: serviceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    QuestionId:
      name: questionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SitterSlug:
      name: sitterSlug
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 100
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RoleType:
      type: string
      enum: [SITTER, CLIENT]
    BookingStatus:
      type: string
      enum: [PENDING, QUOTED, CONFIRMED, COMPLETED, CANCELLED]
    PaymentStatus:
      type: string
      enum: [UNPAID, PROOF_UPLOADED, PAID, REFUNDED]
    VisitStatus:
      type: string
      enum: [SCHEDULED, IN_PROGRESS, DONE, CANCELLED]
    TrustCircleStatus:
      type: string
      enum: [ACTIVE, BLOCKED]
    SubscriptionStatus:
      type: string
      enum: [TRIAL, ACTIVE, PAST_DUE, EXPIRED, SUSPENDED]
    MediaType:
      type: string
      enum: [PHOTO, VIDEO]
    RegisterRequest:
      type: object
      required: [email, password, roleType, displayName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128 }
        roleType: { $ref: "#/components/schemas/RoleType" }
        displayName: { type: string, minLength: 1, maxLength: 100 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128 }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 16 }
    AuthTokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, minimum: 1 }
    MeResponse:
      type: object
      required: [accountId, email, profiles]
      properties:
        accountId: { type: string, format: uuid }
        email: { type: string, format: email }
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/UserProfileSummary"
    UserProfileSummary:
      type: object
      required: [profileId, role]
      properties:
        profileId: { type: string, format: uuid }
        role: { $ref: "#/components/schemas/RoleType" }
        name: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
    SitterProfile:
      type: object
      required: [profileId, name]
      properties:
        profileId: { type: string, format: uuid }
        name: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        phone: { type: string, nullable: true }
        serviceAreas:
          type: array
          items: { type: string }
        bioSummary: { type: string, nullable: true }
    UpdateSitterProfileRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        avatarUrl: { type: string, format: uri }
        phone: { type: string, maxLength: 50 }
        serviceAreas:
          type: array
          items: { type: string, minLength: 1, maxLength: 100 }
        bioSummary: { type: string, maxLength: 2000 }
    ServicePlan:
      type: object
      required: [serviceId, name, basePrice, durationMinutes, isActive]
      properties:
        serviceId: { type: string, format: uuid }
        name: { type: string }
        basePrice: { type: number }
        durationMinutes: { type: integer, minimum: 1 }
        isActive: { type: boolean }
    CreateServiceRequest:
      type: object
      required: [name, basePrice, durationMinutes]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        basePrice: { type: number, minimum: 0 }
        durationMinutes: { type: integer, minimum: 1 }
    UpdateServiceRequest:
      allOf:
        - $ref: "#/components/schemas/CreateServiceRequest"
    QuestionItem:
      type: object
      required: [questionId, questionText, sortOrder, isActive]
      properties:
        questionId: { type: string, format: uuid }
        questionText: { type: string }
        sortOrder: { type: integer, minimum: 0 }
        isActive: { type: boolean }
    CreateQuestionRequest:
      type: object
      required: [questionText]
      properties:
        questionText: { type: string, minLength: 1, maxLength: 1024 }
    UpdateQuestionRequest:
      allOf:
        - $ref: "#/components/schemas/CreateQuestionRequest"
    ReorderQuestionsRequest:
      type: object
      required: [questionIds]
      properties:
        questionIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
    BookingPreview:
      type: object
      required: [sitterName, services, questions]
      properties:
        sitterName: { type: string }
        services:
          type: array
          items: { $ref: "#/components/schemas/ServicePlan" }
        questions:
          type: array
          items: { $ref: "#/components/schemas/QuestionItem" }
    PublicAvailability:
      type: object
      required: [bookable, reasonCode]
      properties:
        bookable: { type: boolean }
        reasonCode:
          type: string
          enum: [OK, MONTHLY_CAP_REACHED, SUBSCRIPTION_EXPIRED, MANUALLY_CLOSED]
    ClientProfile:
      type: object
      required: [profileId, name]
      properties:
        profileId: { type: string, format: uuid }
        name: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        phone: { type: string, nullable: true }
    UpdateClientProfileRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        avatarUrl: { type: string, format: uri }
        phone: { type: string, maxLength: 50 }
    Pet:
      type: object
      required: [petId, name, species]
      properties:
        petId: { type: string, format: uuid }
        name: { type: string }
        species: { type: string, enum: [CAT, DOG, OTHER] }
        gender: { type: string, enum: [MALE, FEMALE, UNKNOWN], nullable: true }
        isNeutered: { type: boolean, nullable: true }
        medicalNotes: { type: string, nullable: true }
        personalityNotes: { type: string, nullable: true }
        avatarUrl: { type: string, format: uri, nullable: true }
    CreatePetRequest:
      type: object
      required: [name, species]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        species: { type: string, enum: [CAT, DOG, OTHER] }
        gender: { type: string, enum: [MALE, FEMALE, UNKNOWN] }
        isNeutered: { type: boolean }
        medicalNotes: { type: string, maxLength: 4000 }
        personalityNotes: { type: string, maxLength: 4000 }
        avatarUrl: { type: string, format: uri }
    UpdatePetRequest:
      allOf:
        - $ref: "#/components/schemas/CreatePetRequest"
    CreateBookingRequest:
      type: object
      required: [sitterProfileId, serviceId, petIds, startAt, endAt]
      properties:
        sitterProfileId: { type: string, format: uuid }
        serviceId: { type: string, format: uuid }
        petIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        questionnaireAnswers:
          type: array
          items:
            type: object
            required: [questionId, answerText]
            properties:
              questionId: { type: string, format: uuid }
              answerText: { type: string, minLength: 1 }
    RescheduleBookingRequest:
      type: object
      required: [startAt, endAt]
      properties:
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
    SubmitQuoteRequest:
      type: object
      required: [surchargeAmount, discountAmount, pricingNotes]
      properties:
        surchargeAmount: { type: number, minimum: 0 }
        discountAmount: { type: number, minimum: 0 }
        pricingNotes: { type: string, minLength: 1, maxLength: 2000 }
    UploadPaymentProofRequest:
      type: object
      required: [proofUrl]
      properties:
        proofUrl: { type: string, format: uri }
        note: { type: string, maxLength: 500 }
    CancelBookingRequest:
      type: object
      properties:
        reason: { type: string, maxLength: 500 }
    Booking:
      type: object
      required: [bookingId, orderStatus, paymentStatus, totalAmount]
      properties:
        bookingId: { type: string, format: uuid }
        orderStatus: { $ref: "#/components/schemas/BookingStatus" }
        paymentStatus: { $ref: "#/components/schemas/PaymentStatus" }
        baseAmount: { type: number }
        surchargeAmount: { type: number }
        discountAmount: { type: number }
        totalAmount: { type: number }
        pricingNotes: { type: string, nullable: true }
    PaymentProof:
      type: object
      required: [paymentProofId, bookingId, proofUrl, uploadedAt]
      properties:
        paymentProofId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        proofUrl: { type: string, format: uri }
        note: { type: string, nullable: true }
        uploadedAt: { type: string, format: date-time }
    CreateReferralRequest:
      type: object
      required: [toSitterId]
      properties:
        toSitterId: { type: string, format: uuid }
        reason: { type: string, maxLength: 500 }
    Referral:
      type: object
      required: [referralId, bookingId, fromSitterId, toSitterId, status]
      properties:
        referralId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        fromSitterId: { type: string, format: uuid }
        toSitterId: { type: string, format: uuid }
        status: { type: string, enum: [PENDING, ACCEPTED, REJECTED, EXPIRED] }
    SitterSearchResult:
      type: object
      required: [sitterId, name]
      properties:
        sitterId: { type: string, format: uuid }
        name: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
    AddTrustCirclePartnerRequest:
      type: object
      required: [trustedSitterId]
      properties:
        trustedSitterId: { type: string, format: uuid }
    UpdateTrustCircleStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/TrustCircleStatus" }
    TrustCircleRelation:
      type: object
      required: [relationId, ownerSitterId, trustedSitterId, status]
      properties:
        relationId: { type: string, format: uuid }
        ownerSitterId: { type: string, format: uuid }
        trustedSitterId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/TrustCircleStatus" }
    Visit:
      type: object
      required: [visitId, bookingId, status, visitStartTime, visitEndTime]
      properties:
        visitId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/VisitStatus" }
        visitStartTime: { type: string, format: date-time }
        visitEndTime: { type: string, format: date-time }
        sitterNotes: { type: string, nullable: true }
    VisitChecklistItem:
      type: object
      required: [itemId, itemName, isCustom, isCompleted]
      properties:
        itemId: { type: string, format: uuid }
        itemName: { type: string }
        isCustom: { type: boolean }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
    UpdateChecklistRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [itemId, isCompleted]
            properties:
              itemId: { type: string, format: uuid }
              isCompleted: { type: boolean }
    CreateCustomChecklistItemRequest:
      type: object
      required: [itemName]
      properties:
        itemName: { type: string, minLength: 1, maxLength: 255 }
        sortOrder: { type: integer, minimum: 0, default: 0 }
    UploadVisitMediaRequest:
      type: object
      required: [mediaType, mediaUrl]
      properties:
        mediaType: { $ref: "#/components/schemas/MediaType" }
        mediaUrl: { type: string, format: uri }
        caption: { type: string, maxLength: 500 }
    VisitMedia:
      type: object
      required: [visitMediaId, visitId, mediaType, mediaUrl, createdAt]
      properties:
        visitMediaId: { type: string, format: uuid }
        visitId: { type: string, format: uuid }
        mediaType: { $ref: "#/components/schemas/MediaType" }
        mediaUrl: { type: string, format: uri }
        caption: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    UpdateVisitNotesRequest:
      type: object
      required: [sitterNotes]
      properties:
        sitterNotes: { type: string, minLength: 1, maxLength: 4000 }
    LiveVisitStatus:
      type: object
      required: [visitId, status, checklist]
      properties:
        visitId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/VisitStatus" }
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/VisitChecklistItem"
    MonthlyPayout:
      type: object
      required: [month, totalIncome, totalPaidOrders]
      properties:
        month: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
        totalIncome: { type: number }
        totalPaidOrders: { type: integer, minimum: 0 }
        records:
          type: array
          items:
            type: object
            required: [bookingId, amount]
            properties:
              bookingId: { type: string, format: uuid }
              amount: { type: number }
    Subscription:
      type: object
      required: [subscriptionId, planCode, status]
      properties:
        subscriptionId: { type: string, format: uuid }
        planCode: { type: string }
        status: { $ref: "#/components/schemas/SubscriptionStatus" }
        monthlyOrderLimit: { type: integer, minimum: 1 }
        startedAt: { type: string, format: date-time, nullable: true }
        expiredAt: { type: string, format: date-time, nullable: true }
    CreateSubscriptionCheckoutRequest:
      type: object
      required: [planCode]
      properties:
        planCode: { type: string, minLength: 1, maxLength: 50 }
    CheckoutSession:
      type: object
      required: [checkoutUrl]
      properties:
        checkoutUrl: { type: string, format: uri }
    Notification:
      type: object
      required: [notificationId, type, title, isRead, createdAt]
      properties:
        notificationId: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        isRead: { type: boolean }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
security:
  - bearerAuth: []
