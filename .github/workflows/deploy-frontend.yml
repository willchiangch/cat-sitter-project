# 前端部署管線：僅在 frontend/** 或本檔變更且推送到 develop/main 時觸發
# 需在 GitHub repo Settings -> Secrets and variables -> Actions 設定：
#   - FIREBASE_SERVICE_ACCOUNT：Firebase 服務帳號 JSON 整份內容（用於 Hosting 部署）
#   - FIREBASE_PROJECT_ID：填入你的 Firebase 專案 ID
#   - VITE_API_BASE_URL（選用）：正式環境後端 API 基底網址，例如 https://your-api.run.app

name: Deploy Frontend to Firebase Hosting

on:
  workflow_dispatch: # 目前開發階段，改為手動觸發
  # push:
  #   branches:
  #     - main    # Production 正式環境
  #     - develop # UAT 測試環境
  #   paths:
  #     - "frontend/**"
  #     - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: 安裝依賴
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found in frontend/, skip install."
          fi

      # 注入環境變數（Vite 需 VITE_ 前綴才會被打進 build）
      - name: 注入環境變數
        env:
          # 填入你的後端 API 基底網址（或由 GitHub Secret 提供）
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          echo "VITE_API_BASE_URL=${VITE_API_BASE_URL:-填入你的後端API基底網址}" >> .env.production

      - name: 編譯前端
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script in package.json, skip build."
          fi

      # 僅 main 部署到 live；develop 可改為預覽頻道或省略部署
      - name: 部署至 Firebase Hosting
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          # 填入你的 Firebase 服務帳號 JSON（整份內容）
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          # 填入你的 Firebase 專案 ID
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
