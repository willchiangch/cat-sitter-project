name: Build and Deploy to GCP

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # WIF OIDC 登入必備

env:
  PROJECT_ID: 'wd-pet-sitter'
  REGION: 'asia-east1'
  AR_REPO: 'cat-sitter-repo'
  IMAGE_NAME: 'cat-sitter-app'
  SERVICE_NAME: 'cat-sitter-app'
  RUNNER_SA: 'cat-sitter-runner@wd-pet-sitter.iam.gserviceaccount.com'

jobs:
  deploy:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 登入 Google Cloud (透過 WIF OIDC)
      # 請在 GitHub Secrets 中設定 GCP_PROJECT_NUMBER
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-deployer@wd-pet-sitter.iam.gserviceaccount.com'
          create_credentials_file: true

      # 2. 設定 Google Cloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 3. 建置前端靜態檔案 (獨立部署到 Firebase Hosting，不再內嵌進 backend)
      - name: Set up Node.js and Build Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend Static Assets
        run: |
          cd frontend
          npm ci
          npm run build

      # 4. 執行後端單元/整合測試 (擋在 Docker build 之前，失敗就不部署)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      - name: Run Backend Tests
        run: |
          cd backend
          mvn test

      # 5. 配置 Docker 認證登入 GCP Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 6. Build and Push Backend Docker Image (純 API，不再內嵌前端靜態資源)
      - name: Build and Push Docker Image
        run: |
          cd backend
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 7. 部署至 GCP Cloud Run
      - name: Deploy to Cloud Run
        id: deploy-run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_TAG }} \
            --region=${{ env.REGION }} \
            --service-account=${{ env.RUNNER_SA }} \
            --memory=1Gi \
            --cpu=1 \
            --cpu-boost \
            --set-env-vars=SPRING_PROFILES_ACTIVE=prod,SUPABASE_POOLER_HOST=${{ vars.SUPABASE_POOLER_HOST }},SPRING_DATASOURCE_USERNAME=${{ vars.SUPABASE_DB_USERNAME }} \
            --set-secrets=SPRING_DATASOURCE_PASSWORD=DB_PASSWORD:latest,APP_SECURITY_JWT_SECRET=JWT_SECRET:latest,INTERNAL_CRON_SECRET=INTERNAL_CRON_SECRET:latest \
            --allow-unauthenticated \
            --quiet

      # 8. 部署前端至 Firebase Hosting (透過 rewrite 將 /api/** 轉發至上一步的 Cloud Run service)
      - name: Deploy Frontend to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npx firebase-tools@latest deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive

          echo "BASE_URL=https://${{ env.PROJECT_ID }}.web.app" >> $GITHUB_ENV

      # 9. 執行 Playwright E2E 測試
      - name: Install Playwright Browsers and Run Tests
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium
          # 使用 Firebase Hosting 網址作為測試目標 (真實入口，/api 會經 rewrite 打到 Cloud Run)
          BASE_URL=${{ env.BASE_URL }} npx playwright test

      # 10. 清理 E2E 種子測試帳號累積的訂單資料 (Supabase 持久化，避免清單越跑越髒)
      - name: Cleanup E2E Test Orders
        if: always()
        run: |
          curl -sf -X POST \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_CRON_SECRET }}" \
            "${{ env.BASE_URL }}/api/internal/cron/test-data/cleanup-seed-orders"

      # 11. 上傳 Playwright 測試報告 (僅保留 3 天以防佔用額度)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/report/
          retention-days: 3
