# 後端部署管線：僅在 backend/** 或本檔變更且推送到 develop/main 時觸發
# 需在 GitHub repo Settings -> Secrets and variables -> Actions 設定：
#   - GCP_SERVICE_ACCOUNT_KEY：GCP 服務帳號 JSON 整份內容（或改用 Workload Identity Federation）
#   - GCP_PROJECT_ID：填入你的 GCP 專案代號
#   - GCP_REGION：填入你的 Cloud Run 區域，例如 asia-east1
#   - GAR_REPOSITORY（選用）：Artifact Registry 倉庫名稱，例如 cat-sitter-repo
# 部署後 Cloud Run 啟動時會跑 Flyway；DB 密碼、JWT Secret 等請由 GCP Secret Manager 注入。

name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main    # Production 正式環境
      - develop # UAT 測試環境
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Java 與 Maven 環境
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: 執行單元測試
        run: |
          if [ -f pom.xml ]; then
            mvn -B test
          else
            echo "No pom.xml found in backend/, skip tests."

      - name: 登入 GCP
        uses: google-github-actions/auth@v2
        with:
          # 填入你的 GCP 服務帳號 JSON 整份內容
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: 設定 gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          # 填入你的 GCP 專案代號
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 容器化：若使用 Dockerfile 則用 Cloud Build；若用 Jib 可改為 mvn compile jib:build
      - name: 設定 Docker 使用 Artifact Registry
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | gcloud auth activate-service-account --key-file=-
          # GCP_REGION 即「填入你的 GCP 區域」，例如 asia-east1
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: 建置並推送容器映像至 GAR
        run: |
          # GCP_PROJECT_ID / GCP_REGION / GAR_REPOSITORY 請在 Secrets 設定（GAR_REPOSITORY = 填入你的 Artifact Registry 倉庫名稱）
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          REGION="${{ secrets.GCP_REGION }}"
          REPO="${{ secrets.GAR_REPOSITORY }}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/cat-sitter-backend"
          gcloud builds submit --tag "$IMAGE" .

      - name: 部署至 Cloud Run
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          REGION="${{ secrets.GCP_REGION }}"
          REPO="${{ secrets.GAR_REPOSITORY }}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/cat-sitter-backend"
          gcloud run deploy cat-sitter-backend \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated
          # 若 DB 密碼、JWT 等放在 Secret Manager，請在 Cloud Run 服務中設定「變數/機密」對應
