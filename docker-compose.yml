services:
  db:
    image: postgres:16-alpine
    container_name: pet-sitter-db
    environment:
      POSTGRES_USER: petsitter_user
      POSTGRES_PASSWORD: petsitter_password
      POSTGRES_DB: petsitter_db
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
